name: Run script 16 times daily

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '30 1 * * *'
    - cron: '0 3 * * *'
    - cron: '30 4 * * *'
    - cron: '0 6 * * *'
    - cron: '30 7 * * *'
    - cron: '0 9 * * *'
    - cron: '30 10 * * *'
    - cron: '0 12 * * *'
    - cron: '30 13 * * *'
    - cron: '0 15 * * *'
    - cron: '30 16 * * *'
    - cron: '0 18 * * *'
    - cron: '30 19 * * *'
    - cron: '0 21 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch: # This allows you to run it manually to test

permissions:
  contents: write  # CRITICAL: Allows the bot to save data.json back to your repo

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run script
        run: python main.py
        env:
          GX_api_key: ${{ secrets.X_api_key }}
          X_api_secrete: ${{ secrets.X_api_secrete }}
          X_AccessToken: ${{ secrets.X_AccessToken }}
          X_Access_Token_Secret: ${{ secrets.X_Access_Token_Secret }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_backupai: ${{ secrets.X_backupai }}
          X_foot_org: ${{ secrets.X_foot_org }}
          X_rapidapi: ${{ secrets.X_rapidapi }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # [skip ci] prevents the push from triggering the script again
          git commit -m "Update post history [skip ci]" || echo "No changes to commit"
          git push